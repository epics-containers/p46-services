blueapi:
  debug:
    enabled: true  
  ingress:
    enabled: false
    hosts:
      - host: p46-blueapi.diamond.ac.uk
        paths:
          - path: /
            pathType: Prefix
  extraEnvVars:
    - name: BEAMLINE
      value: p46
    - name: INSTRUMENT
      value: p46
    - name: EPICS_PVA_NAME_SERVERS
      value: p46-epics-gateways:9075
    - name: EPICS_CA_NAME_SERVERS
      value: p46-epics-gateways:9064
    - name: EPICS_PVA_AUTO_ADDR_LIST
      value: "NO"
    - name: EPICS_CA_AUTO_ADDR_LIST
      value: "NO"

  tracing:
    otlp:
      enabled: true
      server:
        host: http://opentelemetry-collector.tracing

  worker:
    numtracker:
      url: http://p46-numtracker/graphql
    env:
      metadata:
        instrument: p46
      sources:
        - kind: dodal
          module: dodal.beamlines.training_rig
        - kind: planFunctions
          module: htss_rig_bluesky.plans
        - kind: planFunctions
          module: dodal.plans
      events:
        broadcast_status_events: False
    stomp:
      auth:
        username: guest
        password: guest
      url: tcp://p46-rabbitmq:61613
      enabled: true
    logging:
      level: "INFO"
      graylog:
        enabled: true

    oidc:
      well_known_url: "https://identity-test.diamond.ac.uk/realms/dls/.well-known/openid-configuration"
      client_id: "blueapi-cli"
      client_audience: "account"
      logout_redirect_endpoint: "oauth2/sign_out"
    scratch:
      root: /dls_sw/htss/p46/scratch
      repositories:
        - name: dodal
          remote_url: https://github.com/DiamondLightSource/dodal.git
        - name: htss-rig-bluesky
          remote_url: https://github.com/DiamondLightSource/htss-rig-bluesky.git  
        - name: tiled
          remote_url: https://github.com/bluesky/tiled.git

    tiled:
      enabled: true
      url: "http://p46-tiled:8000/api/v1/"
  initContainer:
    enabled: true
    persistentVolume:
      enabled: true
      # existingClaimName: foo


oauth2:
  proxyVarsAsSecrets: false
  extraEnv:
    - name: OAUTH2_PROXY_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: blueapi-secret
          key: client-secret
    - name: OAUTH2_PROXY_COOKIE_SECRET
      valueFrom:
        secretKeyRef:
          name: blueapi-secret
          key: cookie-secret
  config:
    configFile: |-
      skip_provider_button = true
      skip_jwt_bearer_tokens = true
      cookie_refresh="1m"
      cookie_expire="30m"
      email_domains = [ "*" ]
      skip_auth_routes=[
      "GET=^/config/oidc",
      "GET=^/healthz"
      ]
      whitelist_domains=["identity-test.diamond.ac.uk"]
  ingress:
    enabled: true
    hosts:
      - p46-blueapi.diamond.ac.uk
    annotations:
      nginx.ingress.kubernetes.io/proxy-buffer-size: "8k"
    path: /
    pathType: Prefix
  alphaConfig:
    enabled: true
    configData:
      upstreamConfig:
        proxyRawPath: true
        upstreams:
          - id: blueapi
            path: /
            uri: http://p46-blueapi
      providers:
        - provider: oidc
          id: identity-test.diamond.ac.uk
          clientID: p46-blueapi
          clientSecret: ${OAUTH2_PROXY_CLIENT_SECRET}
          oidcConfig:
            insecureAllowUnverifiedEmail: true
            insecureSkipNonce: false
            emailClaim: sub
            audienceClaims: ["aud"]
            extraAudiences: ["blueapi"]
            issuerURL: https://identity-test.diamond.ac.uk/realms/dls
      injectRequestHeaders:
        - name: Authorization
          values:
            - claim: access_token
              prefix: "Bearer "
      injectResponseHeaders:
        - name: Identity
          values:
            - claim: access_token
