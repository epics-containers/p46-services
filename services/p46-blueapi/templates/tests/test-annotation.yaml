apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-last-used-stamper-test-annotation"
  annotations:
    "helm.sh/hook": test
spec:
  serviceAccountName: {{ .Release.Name }}-last-used-stamper
  containers:
    - name: test
      image: bitnami/kubectl:latest
      command: ["/bin/sh", "-c"]
      args:
        - |
          # Check that at least one PVC has been stamped with a last-used annotation
          kubectl get pvc -n {{ .Release.Namespace }} \
            -o jsonpath='{.items[*].metadata.annotations.last-used}' | grep -q .
  restartPolicy: Never
