apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-last-used-stamper
  namespace: {{ .Release.Namespace }}
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-last-used-stamper
  namespace: {{ .Release.Namespace }}
rules:
- apiGroups: [""]
  resources: ["pods", "persistentvolumeclaims"]
  verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-last-used-stamper
  namespace: {{ .Release.Namespace }}
subjects:
- kind: ServiceAccount
  name: {{ .Release.Name }}-last-used-stamper
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ .Release.Name }}-last-used-stamper
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-last-used-stamper
  namespace: {{ .Release.Namespace }}
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: {{ .Release.Name }}-last-used-stamper
          tolerations:
            - key: beamline
              operator: Equal
              value: bl46p
              effect: NoSchedule
            - key: location
              operator: Equal
              value: bl46p
              effect: NoSchedule
            - key: nodetype
              operator: Equal
              value: training-rig
              effect: NoSchedule
          containers:
          - name: last-used-stamper
            image: bitnami/kubectl:latest
            imagePullPolicy: IfNotPresent
            command:
              - /bin/sh
              - -c
              - |
                # Get PVCs belonging to this blueapi release
                ALL_PVC=$(kubectl get pvc -l "argocd.argoproj.io/instance={{ .Release.Namespace }}_{{ .Release.Name }}" \
                  -o jsonpath='{.items[*].metadata.name}' -n {{ .Release.Namespace }} | tr ' ' '\n')
                # Get all PVCs currently mounted by running pods
                MOUNTED_PVCS=$(kubectl get pods -n {{ .Release.Namespace }} \
                  -o=jsonpath='{.items[*].spec.volumes[*].persistentVolumeClaim.claimName}' | tr ' ' '\n' | sort -u)
                NOW=$(date +%s)
                for pvc in $ALL_PVC; do
                  ANNOTATION=$(kubectl get pvc $pvc -n {{ .Release.Namespace }} -o=jsonpath='{.metadata.annotations.last-used}')
                  if [ -z "$ANNOTATION" ]; then
                    kubectl annotate --overwrite pvc $pvc -n {{ .Release.Namespace }} last-used="$NOW"
                  elif echo "$MOUNTED_PVCS" | grep -qx "$pvc"; then
                    kubectl annotate --overwrite pvc $pvc -n {{ .Release.Namespace }} last-used="$NOW"
                  fi
                done
          restartPolicy: OnFailure
