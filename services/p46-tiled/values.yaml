tiled:
  extraEnvVars:
  - name: FOO
    value: bar
  image:
    repository: ghcr.io/zohebshaikh/tiled
    tag: 0.3.1
  config:
    authentication:
      providers:
      - provider: keycloak_oidc
        authenticator: tiled.authenticators:ProxiedOIDCAuthenticator
        args:
          audience: account
          client_id: p46-blueapi
          device_flow_client_id: p46-blueapi
          well_known_uri: "https://authn.diamond.ac.uk/realms/master/.well-known/openid-configuration"
          scopes:
            - openid
            - email
            - profile
          confirmation_message: "You have logged in with Proxied OIDC as {id}."

    access_control:
      access_policy: "tiled.access_control.access_policies:ExternalPolicyDecisionPoint"
      args:
        authorization_provider: http://p46-opa/v1/data/subject_session/
        audience: account
        node_access: "allow"
        filter_nodes: "tags"
        scopes_access: "scopes"

    trees:
      - path: /
        tree: catalog
        args:
          uri: "sqlite:///./catalog.db"
          writable_storage: "./data"
          # This creates the database if it does not exist. This is convenient, but in
          # a horizontally-scaled deployment, this can be a race condition and multiple
          # containers may simultaneously attempt to create the database.
          # If that is a problem, set this to false, and run:
          #
          # tiled catalog init URI
          #
          # separately.
          init_if_not_exists: true
          top_level_access_blob: {"tags": ["public"]}
  nodeSelector:
    kubernetes.io/hostname: bl46p-ea-serv-01.diamond.ac.uk
  ingress:
    enabled: true
    className: "nginx"
    hosts:
      - host: p46-tiled.diamond.ac.uk
        paths:
          - path: /
            pathType: Prefix
  resources:
    limits:
      cpu: 1000m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 2Gi
  tolerations:
  - effect: NoSchedule
    key: nodetype
    operator: Equal
    value: training-rig
  - effect: NoSchedule
    key: beamline
    operator: Equal
    value: bl46p
  volumeMounts:
  - mountPath: /deploy/config
    name: config
    readOnly: true
  - mountPath: /exports/mybeamline
    mountPropagation: HostToContainer
    name: data
  volumes:
  - hostPath:
      path: /exports/mybeamline
      type: DirectoryOrCreate
    name: data

glazed:
  image:
    repository: ghcr.io/diamondjoseph/glazed
  customConfig:
    enabled: true
    toml: |-
      bind_address = "0.0.0.0:3000"

      [tiled_client]
      address = "http://p46-services:8000"


oauth2:
  proxyVarsAsSecrets: false
  extraEnv:
    - name: OAUTH2_PROXY_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: blueapi-secret
          key: client-secret
    - name: OAUTH2_PROXY_COOKIE_SECRET
      valueFrom:
        secretKeyRef:
          name: blueapi-secret
          key: cookie-secret
  config:
    configFile: |-
      skip_provider_button = true
      skip_jwt_bearer_tokens = true
      cookie_refresh="1m"
      cookie_expire="30m"
      email_domains = [ "*" ]
      skip_auth_routes=[
      "GET=^/config/oidc",
      "GET=^/healthz"
      ]
      whitelist_domains=["authn.diamond.ac.uk"]
  ingress:
    enabled: true
    hosts:
      - p46-blueapi.diamond.ac.uk
    annotations:
      nginx.ingress.kubernetes.io/proxy-buffer-size: "8k"
    path: /
    pathType: Prefix
  alphaConfig:
    enabled: true
    configData:
      upstreamConfig:
        proxyRawPath: true
        upstreams:
          - id: blueapi
            path: /
            uri: http://p46-tiled
      providers:
        - provider: oidc
          id: authn.diamond.ac.uk
          clientID: p46-blueapi
          clientSecret: ${OAUTH2_PROXY_CLIENT_SECRET}
          oidcConfig:
            insecureAllowUnverifiedEmail: true
            emailClaim: sub
            audienceClaims: ["aud"]
            extraAudiences: ["blueapi"]
            issuerURL: https://authn.diamond.ac.uk/realms/master
      injectRequestHeaders:
        - name: Authorization
          values:
            - claim: access_token
              prefix: "Bearer "
      injectResponseHeaders:
        - name: Identity
          values:
            - claim: access_token
