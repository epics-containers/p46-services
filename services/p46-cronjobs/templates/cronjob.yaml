apiVersion: batch/v1
kind: CronJob
metadata:
  name: last-used-stamper
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: {{ include "p46-cronjobs.serviceAccountName" . }}
          tolerations:
            - key: beamline
              operator: Equal
              value: bl46p
              effect: NoSchedule
            - key: location
              operator: Equal
              value: bl46p
              effect: NoSchedule
            - key: nodetype
              operator: Equal
              value: training-rig
              effect: NoSchedule
          containers:
          - name: last-used-stamper
            image: bitnami/kubectl:latest
            imagePullPolicy: IfNotPresent
            command:
              - /bin/sh
              - -c
              - |
                # Get all PVCs in the namespace, one per line
                ALL_PVC=$(kubectl get pvc -o jsonpath='{.items[*].metadata.name}' -n {{ .Release.Namespace }}| tr ' ' '\n')
                # Get all PVCs currently mounted by running pods
                MOUNTED_PVCS=$(kubectl get pods -n {{ .Release.Namespace }}\
                  -o=jsonpath='{.items[*].spec.volumes[*].persistentVolumeClaim.claimName}' | tr ' ' '\n' | sort -u)
                NOW=$(date +%s)
                for pvc in $ALL_PVC; do
                  ANNOTATION=$(kubectl get pvc $pvc -n {{ .Release.Namespace }} -o=jsonpath='{.metadata.annotations.last-used}')
                  if [ -z "$ANNOTATION" ]; then
                    # PVC has never been stamped — set initial timestamp
                    kubectl annotate --overwrite pvc $pvc -n {{ .Release.Namespace }} last-used="$NOW"
                  elif echo "$MOUNTED_PVCS" | grep -qx "$pvc"; then
                    # PVC is actively mounted — update timestamp
                    kubectl annotate --overwrite pvc $pvc -n {{ .Release.Namespace }} last-used="$NOW"
                  fi
                done
          restartPolicy: OnFailure
