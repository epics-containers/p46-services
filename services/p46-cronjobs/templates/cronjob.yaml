apiVersion: batch/v1
kind: CronJob
metadata:
  name: last-used-stamper
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: {{ include "p46-cronjobs.serviceAccountName" . }}
          tolerations:
            - key: beamline
              operator: Equal
              value: bl46p
              effect: NoSchedule
            - key: location
              operator: Equal
              value: bl46p
              effect: NoSchedule
            - key: nodetype
              operator: Equal
              value: training-rig
              effect: NoSchedule
          containers:
          - name: last-used-stamper
            image: bitnami/kubectl:latest
            imagePullPolicy: IfNotPresent
            command:
              - /bin/sh
              - -c
              - |
                NAMESPACE={{ .Release.Namespace }}
                All_PVC=$(kubectl get pvc -o jsonpath='{.items[*].metadata.name}' -n $NAMESPACE | tr ' ' '\n')
                MOUNTED_PVCS=$(kubectl get pods -n $NAMESPACE \
                  -o=jsonpath='{.items[*].spec.volumes[*].persistentVolumeClaim.claimName}' | tr ' ' '\n' | sort -u)
                NOW=$(date +%s)
                for pvc in $All_PVC; do
                  ANNOTATION=$(kubectl get pvc $pvc -n $NAMESPACE -o=jsonpath='{.metadata.annotations.last-used}')
                  if [ -z "$ANNOTATION" ]; then
                    kubectl annotate --overwrite pvc $pvc -n $NAMESPACE last-used="$NOW"
                  elif echo "$MOUNTED_PVCS" | grep -q "$pvc"; then
                    kubectl annotate --overwrite pvc $pvc -n $NAMESPACE last-used="$NOW"
                  fi
                done`

          restartPolicy: OnFailure