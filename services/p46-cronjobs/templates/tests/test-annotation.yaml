apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "p46-cronjobs.serviceAccountName" . }}-test-annotation"
  annotations:
    "helm.sh/hook": test
spec:
  serviceAccountName: {{ include "p46-cronjobs.serviceAccountName" . }}
  containers:
    - name: test
      image: bitnami/kubectl:latest
      command: ["/bin/sh", "-c"]
      args:
        - |
          # Check that at least one PVC has been stamped with a last-used annotation
          kubectl get pvc -n {{ .Release.Name }} \
            -o jsonpath='{.items[*].metadata.annotations.last-used}' | grep -q .
  restartPolicy: Never
